<form class="grid gap-4" [formRoot]="formTree" (submit)="submitForm()">
	@for (field of fields(); track field.name) {
		<div class="grid gap-2">
			<label class="text-sm font-medium text-slate-950" [attr.for]="field.name">{{ field.label }}</label>

			<div class="grid gap-2 md:grid-cols-[minmax(10rem,14rem)_1fr]">
				<lib-form-select
					[formField]="operatorField(field)" [options]="operatorOptions(field)" />

				@if (field.options && field.multiple) {
					<lib-form-select-multi
						[formField]="multiSelectValueField(field)" [options]="field.options" />
				} @else if (field.options) {
					<lib-form-select
						[formField]="selectValueField(field)" [options]="field.options" />
				} @else if (field.type === "boolean") {
					<lib-form-checkbox
						[formField]="booleanValueField(field)" [label]="field.label" />
				} @else if (field.type === "date" || field.type === "datetime" || field.type === "time") {
					<lib-form-date
						[formField]="textValueField(field)" [type]="dateType(field)" />
				} @else if (field.type === "code") {
					<lib-form-code
						[formField]="textValueField(field)" [language]="codeLanguage(field)" />
				} @else {
					<lib-form-input
						[formField]="inputValueField(field)" [type]="field.type === 'number' ? 'number' : 'text'" />
				}
			</div>
		</div>
	}

	<div class="flex justify-end">
		<button
			class="min-h-10 rounded-md bg-blue-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-blue-700 focus:ring-2 focus:ring-blue-600/20 focus:outline-none disabled:cursor-not-allowed disabled:bg-slate-300"
			type="submit" [disabled]="disabled()">
			{{ submitLabel() }}
		</button>
	</div>
</form>
