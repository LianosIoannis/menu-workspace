<select
	class="mt-1 block min-h-32 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm text-slate-950 shadow-sm shadow-slate-200 transition hover:border-slate-300 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 focus:outline-none disabled:cursor-not-allowed disabled:bg-slate-50 disabled:text-slate-500 invalid:border-rose-500 invalid:focus:border-rose-500 invalid:focus:ring-rose-100"
	[name]="name()" multiple [disabled]="disabled() || readonly()" [required]="required()" [size]="size()"
	(change)="updateValue($event)" (blur)="markTouched()">
	@for (option of options(); track $index) {
		<option [value]="optionValue($index)" [selected]="isSelected(option)" [disabled]="option.disabled">
			{{ option.label }}
		</option>
	}
</select>
