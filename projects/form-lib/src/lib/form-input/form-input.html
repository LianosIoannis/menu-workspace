<input
	class="min-h-10 w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-950 transition outline-none placeholder:text-slate-500 focus:border-blue-600 focus:ring-2 focus:ring-blue-600/20 disabled:cursor-not-allowed disabled:bg-slate-100 disabled:text-slate-500 read-only:bg-slate-100 read-only:text-slate-600 invalid:border-red-600 invalid:focus:border-red-600 invalid:focus:ring-red-600/20"
	[name]="name()" [type]="type()" [value]="value() ?? ''" [placeholder]="placeholder()" [disabled]="disabled()"
	[readOnly]="readonly()" [required]="required()" (input)="updateValue($event)" (blur)="markTouched()" />
