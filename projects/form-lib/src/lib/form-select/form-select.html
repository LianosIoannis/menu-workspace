<ng-select
  class="mt-1 block text-sm"
  bindLabel="label"
  bindValue="value"
  [items]="options()"
  [clearable]="!required()"
  [searchable]="true"
  [readonly]="readonly()"
  [disabled]="disabled()"
  [name]="name()"
  [ngModel]="value()"
  (ngModelChange)="updateValue($event)"
  (blur)="markTouched()"
  [placeholder]="placeholder() || 'Select option'"
/>
