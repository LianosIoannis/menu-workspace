<select
	class="min-h-10 w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-950 transition outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-600/20 disabled:cursor-not-allowed disabled:bg-slate-100 disabled:text-slate-500 invalid:border-red-600 invalid:focus:border-red-600 invalid:focus:ring-red-600/20"
	[name]="name()" [value]="selectedOptionValue()" [disabled]="disabled() || readonly()" [required]="required()"
	(change)="updateValue($event)" (blur)="markTouched()">
	@if (placeholder()) {
		<option value="" [disabled]="required()">{{ placeholder() }}</option>
	}

	@for (option of options(); track $index) {
		<option [value]="optionValue($index)" [disabled]="option.disabled">{{ option.label }}</option>
	}
</select>
