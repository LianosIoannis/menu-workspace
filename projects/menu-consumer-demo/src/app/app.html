<div class="min-h-screen bg-slate-100 text-slate-950">
	<div class="flex min-h-screen">
		<aside
			class="fixed inset-y-0 left-0 z-20 w-80 overflow-hidden border-r border-slate-950/10 bg-slate-900 shadow-2xl shadow-slate-950/20">
			<menu [menuData]="menuData" (onItemClicked)="itemClicked($event)" (onCloseClicked)="closeClicked()"
				(onLogoutClicked)="logoutClicked()" (onProfileClicked)="profileClicked()"></menu>
		</aside>

		<main class="min-h-screen flex-1 pl-80">
			<section class="mx-auto flex min-h-screen max-w-5xl flex-col gap-6 px-8 py-10">
				<div>
					<p class="text-sm font-medium text-slate-500">{{ title() }}</p>
					<h1 class="mt-2 text-3xl font-semibold tracking-normal text-slate-950">Menu and editor library
						consumer</h1>
				</div>

				<div class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
					<p class="text-sm font-medium text-slate-500">Last clicked</p>
					<p class="mt-2 text-lg font-semibold text-slate-900">{{ lastClicked() || "Nothing selected" }}</p>
				</div>

				<section class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm"
					aria-labelledby="editor-demo-heading">
					<div class="mb-4 flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
						<div class="flex flex-col gap-1">
							<p class="text-sm font-medium text-slate-500">Editor library</p>
							<h2 id="editor-demo-heading" class="text-xl font-semibold text-slate-950">Editor demo</h2>
						</div>

						<label class="flex flex-col gap-2 text-sm font-medium text-slate-700">
							Language
							<select
								class="min-h-10 rounded-md border border-slate-300 bg-white px-3 py-2 text-sm text-slate-950 shadow-sm focus:border-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-600/30"
								[value]="editorLanguage()" (change)="changeEditorLanguage($event)">
								@for (language of languageOptions; track language.value) {
								<option [value]="language.value">{{ language.label }}</option>
								}
							</select>
						</label>
					</div>

					@defer {
					<editor [(value)]="editorValue" [language]="editorLanguage()"></editor>
					} @placeholder {
					<div
						class="flex min-h-96 items-center justify-center rounded-md border border-slate-200 bg-slate-50 text-sm font-medium text-slate-600">
						Loading editor...
					</div>
					}

					<div class="mt-4 rounded-md border border-slate-200 bg-slate-50 p-4">
						<p class="text-sm font-medium text-slate-500">Current value</p>
						<pre
							class="mt-2 max-h-56 overflow-auto whitespace-pre-wrap text-sm text-slate-900">{{ editorValue() }}</pre>
					</div>
				</section>
			</section>
		</main>
	</div>
</div>
