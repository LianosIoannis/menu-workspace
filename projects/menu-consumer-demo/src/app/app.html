<div class="min-h-screen bg-slate-100 text-slate-950">
	<div class="flex min-h-screen">
		<aside class="fixed inset-y-0 left-0 z-20 w-80 overflow-hidden border-r border-slate-950/10 bg-slate-900 shadow-2xl shadow-slate-950/20">
			<menu [menuData]="menuData" (onItemClicked)="itemClicked($event)" (onCloseClicked)="closeClicked()" (onLogoutClicked)="logoutClicked()" (onProfileClicked)="profileClicked()"></menu>
		</aside>

		<main class="min-h-screen flex-1 pl-80">
			<section class="mx-auto flex min-h-screen max-w-5xl flex-col gap-6 px-8 py-10">
				<div>
					<p class="text-sm font-medium text-slate-500">{{ title() }}</p>
					<h1 class="mt-2 text-3xl font-semibold tracking-normal text-slate-950">Menu library consumer</h1>
				</div>

				<div class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
					<p class="text-sm font-medium text-slate-500">Last clicked</p>
					<p class="mt-2 text-lg font-semibold text-slate-900">{{ lastClicked() || "Nothing selected" }}</p>
				</div>
			</section>
		</main>
	</div>
</div>
